{% extends 'dashboard/base.html' %}
{% block title %}{{ action }} Service{% endblock %}
{% block content %}
<div class="mb-4"><a href="{% url 'dashboard_products' %}" class="text-muted text-decoration-none"><i class="fas fa-arrow-left me-2"></i>Back</a><h4 class="fw-bold mt-1">{{ action }} Service</h4></div>
<div class="card-dashboard p-4">
  <form method="POST" enctype="multipart/form-data">{% csrf_token %}
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label fw-semibold">Service Name *</label><input type="text" name="name" class="form-control" value="{{ service.name|default:'' }}" required></div>
      <div class="col-md-6"><label class="form-label fw-semibold">Category *</label><select name="category" class="form-select" required>{% for cat in categories %}<option value="{{ cat.id }}" {% if service.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>{% endfor %}</select></div>
      <div class="col-12"><label class="form-label fw-semibold">Short Description</label><input type="text" name="short_description" class="form-control" value="{{ service.short_description|default:'' }}"></div>
      <div class="col-12"><label class="form-label fw-semibold">Full Description</label><textarea name="description" class="form-control" rows="5">{{ service.description|default:'' }}</textarea></div>
      <div class="col-md-4"><label class="form-label fw-semibold">Price (₹) *</label><input type="number" name="price" class="form-control" value="{{ service.price|default:'' }}" step="0.01" required></div>
      <div class="col-md-4"><label class="form-label fw-semibold">Discount Price (₹)</label><input type="number" name="discount_price" class="form-control" value="{{ service.discount_price|default:'' }}" step="0.01"></div>
      <div class="col-md-4"><label class="form-label fw-semibold">Duration</label><input type="text" name="duration" class="form-control" value="{{ service.duration|default:'' }}" placeholder="e.g. 2-3 hours"></div>
      <div class="col-md-6"><label class="form-label fw-semibold">Service Image</label><input type="file" name="image" class="form-control" accept="image/*">{% if service.image %}<img src="{{ service.image.url }}" class="mt-2 rounded" style="height:80px;object-fit:cover;">{% endif %}</div>
      <div class="col-md-3 d-flex align-items-end pb-2"><div class="form-check"><input type="checkbox" name="is_active" class="form-check-input" id="active" {% if service.is_active or not service %}checked{% endif %}><label class="form-check-label fw-semibold" for="active">Active</label></div></div>
      <div class="col-md-3 d-flex align-items-end pb-2"><div class="form-check"><input type="checkbox" name="is_featured" class="form-check-input" id="featured" {% if service.is_featured %}checked{% endif %}><label class="form-check-label fw-semibold" for="featured">Featured</label></div></div>
      <div class="col-12 d-flex gap-2">
        <button type="submit" class="btn btn-primary px-5">{{ action }} Service</button>
        <a href="{% url 'dashboard_products' %}" class="btn btn-outline-secondary px-4">Cancel</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
