{% extends 'base.html' %}
{% block title %}Reset Password - Utkarsh Cleaning{% endblock %}
{% block content %}
<section class="py-5" style="background:var(--light-bg);min-height:70vh;display:flex;align-items:center;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="card border-0 shadow-lg p-4">
          <div class="text-center mb-4">
            <div style="width:70px;height:70px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;">
              <i class="fas fa-lock fa-2x text-white"></i>
            </div>
            <h4 class="fw-bold">Reset Password</h4>
            <p class="text-muted">Enter your new password below.</p>
          </div>

          {% if messages %}
            {% for msg in messages %}
              <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
                {{ msg }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}

          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">New Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock" style="color:var(--primary);"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Enter new password" required minlength="6">
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Confirm New Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock" style="color:var(--primary);"></i></span>
                <input type="password" name="password2" class="form-control" placeholder="Confirm new password" required minlength="6">
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg" style="border-radius:30px;">
              <i class="fas fa-check-circle me-2"></i>Reset Password
            </button>
          </form>

          <div class="text-center mt-3">
            <a href="{% url 'login' %}" style="color:var(--primary);font-weight:600;">
              <i class="fas fa-arrow-left me-1"></i>Back to Login
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
